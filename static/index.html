<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel2Script — 小说转剧本助手</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ====== 顶部标题栏 ====== -->
    <header class="header">
        <div class="header-left">
            <svg class="logo" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <h1 class="title">小说转剧本助手</h1>
        </div>
        <div class="header-right">
            <button class="settings-btn" id="settingsBtn" title="API 设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ====== 主聊天区域 ====== -->
    <main class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
            </div>
            <h2>欢迎使用小说转剧本助手</h2>
            <p>上传 .txt 小说文件，AI 自动生成结构化剧本初稿。</p>
            <p>也可以直接输入文字，与我讨论剧本修改。</p>
            <p class="welcome-hint">支持中英文，基于大模型智能转换。</p>
        </div>
    </main>

    <!-- ====== 底部输入区域 ====== -->
    <footer class="input-area">
        <!-- 选项开关 -->
        <div class="input-options">
            <label class="toggle-label" title="显示 AI 的原始输出和思考过程">
                <input type="checkbox" id="showThinking" />
                <span class="toggle-slider"></span>
                <span class="toggle-text">显示思考内容</span>
            </label>
        </div>

        <!-- 输入行：附件 + 文本框 + 发送 -->
        <div class="input-row" id="inputRow">
            <!-- 文件附件按钮 -->
            <label class="file-btn" id="fileBtn" title="选择 .txt 小说文件上传">
                <input type="file" id="fileInput" accept=".txt" hidden />
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
            </label>

            <!-- 当前选中的文件名（显示在文本框上方） -->
            <div class="file-chip" id="fileChip" style="display:none;">
                <span class="file-chip-name"></span>
                <button class="file-chip-remove" title="移除文件">&times;</button>
            </div>

            <!-- 文本输入 -->
            <textarea
                class="text-input"
                id="textInput"
                rows="1"
                placeholder="输入消息，或上传 .txt 小说文件开始转换..."
            ></textarea>

            <!-- 发送按钮 -->
            <button class="send-btn" id="sendBtn" title="发送">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </footer>

    <!-- ====== API 设置弹窗 ====== -->
    <div class="modal-overlay" id="settingsModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>API 设置</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <label class="field-label">Base URL</label>
                <input class="field-input" id="setBaseUrl" placeholder="https://api.openai.com/v1" />

                <label class="field-label">API Key</label>
                <input class="field-input" id="setApiKey" type="password" placeholder="sk-..." />

                <label class="field-label">Model</label>
                <input class="field-input" id="setModel" placeholder="gpt-4o" />
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">取消</button>
                <button class="btn btn-primary" id="modalSave">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
